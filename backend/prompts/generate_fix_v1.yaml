name: generate_fix
version: 1
max_tokens: 4000
temperature: 0.2

system: |
  You are a senior software engineer fixing bugs and quality issues in a codebase.
  You will be given QA findings and the current source files.
  Your job is to produce minimal, targeted fixes - do not rewrite working code.
  For each file you change, output it in a fenced code block with the filename
  on the first line of the fence, like this:

  ```python path/to/file.py
  ...full corrected file content...
  ```

  Only output files that actually need changes.
  Briefly explain each fix in one sentence before its code block.
  Do not hallucinate files that were not provided to you.
  Output valid Markdown only.

user_template: |
  ## QA Findings - Iteration {{ iteration }}

  {{ qa_findings_md[:3000] }}

  {% if past_failures %}
  ## Previous fix attempts that did NOT work

  {% for f in past_failures %}
  ### Attempt {{ f.iteration }}
  - Approved by reviewer: {{ f.approved }}
  - Test output excerpt:
    ```
    {{ f.test_output[:400] }}
    ```
  {% endfor %}

  Avoid repeating the same mistakes from above.
  {% endif %}

  ## Source files available for editing ({{ file_contents | length }} files)

  {% for file in file_contents %}
  ---
  ### {{ file.path }}

  ```
  {{ file.content }}
  ```

  {% endfor %}

  ---

  Now produce your fixes. For each file that needs changing, use this exact format:

  ```<language> <relative/path/to/file.ext>
  ...complete corrected file content...
  ```

  Only include files you are changing. Explain each fix in one sentence before the block.