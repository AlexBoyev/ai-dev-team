<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Dev Team Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="shell">
    <header class="header">
      <div>
        <h1>AI Dev Team Dashboard</h1>
        <p class="sub">Live view of agents, tasks, and run logs.</p>
      </div>

      <div class="actions">
        <button id="runBtn" class="btn primary">Run</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <div class="card-head">
          <h2>Agents</h2>
          <span id="runBadge" class="badge">Idle</span>
        </div>
        <div id="agents" class="agents"></div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Task Status</h2>
          <span class="muted">auto updates</span>
        </div>
        <div class="chart-wrap">
          <canvas id="taskChart"></canvas>
        </div>
      </section>

      <section class="card span2">
        <div class="card-head">
          <h2>Tasks</h2>
          <span class="muted">queue + results</span>
        </div>
        <div class="table-wrap">
          <table class="table" id="tasksTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>Assigned</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="card span2">
        <div class="card-head">
          <h2>Live Logs</h2>
          <span class="muted">last 250 lines</span>
        </div>
        <div id="logs" class="logs"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
